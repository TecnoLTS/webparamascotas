services:
  app:
    profiles: ["production"]
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: paramascotasec-app
    hostname: paramascotasec-app
    restart: unless-stopped
    init: true
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Guayaquil
      NODE_ENV: production
      APP_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: ${PORT:-3000}
      API_FETCH_TIMEOUT_MS: ${API_FETCH_TIMEOUT_MS:-15000}
      NEXT_PUBLIC_CONTAINER_NAME: next-test
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
      BACKEND_URL_INTERNAL: ${BACKEND_URL_INTERNAL:-http://paramascotasec-backend-web:8080/api}
      INTERNAL_PROXY_TOKEN_FILE: /run/secrets/internal_proxy_token
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      PANEL_IP_MODE: ${PANEL_IP_MODE:-off}
      PANEL_IP_ALLOWLIST: ${PANEL_IP_ALLOWLIST:-}
    working_dir: /app
    command: node_modules/.bin/next start --hostname 0.0.0.0 --port ${PORT:-3000}
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const socket=net.connect({host:'127.0.0.1',port:Number(process.env.PORT||3000)});socket.on('connect',()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1500)"]
      interval: 30s
      timeout: 3s
      retries: 6
      start_period: 20s
    expose:
      - "3000"
    volumes:
      - ./app/public/uploads:/app/public/uploads:rw
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=512m,uid=10001,gid=10001,mode=1777
    secrets:
      - source: internal_proxy_token
        target: internal_proxy_token
        mode: 0444
    networks:
      web_internal:
        aliases:
          - next-test-app
          - paramascotasec-frontend

  app-dev:
    profiles: ["development"]
    build:
      context: ./app
      dockerfile: Dockerfile
      target: dev
      args:
        APP_ENV: development
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: paramascotasec-app-dev
    hostname: paramascotasec-app-dev
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Guayaquil
      NODE_ENV: development
      APP_ENV: development
      NEXT_PUBLIC_APP_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      FRONTEND_DEV_RUNTIME: ${FRONTEND_DEV_RUNTIME:-stable}
      FRONTEND_DEV_BUNDLER: ${FRONTEND_DEV_BUNDLER:-webpack}
      PORT: ${PORT:-3000}
      API_FETCH_TIMEOUT_MS: ${API_FETCH_TIMEOUT_MS:-15000}
      NEXT_PUBLIC_CONTAINER_NAME: next-test
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
      BACKEND_URL_INTERNAL: ${BACKEND_URL_INTERNAL:-http://paramascotasec-backend-web:8080/api}
      INTERNAL_PROXY_TOKEN_FILE: /run/secrets/internal_proxy_token
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      PANEL_IP_MODE: ${PANEL_IP_MODE:-off}
      PANEL_IP_ALLOWLIST: ${PANEL_IP_ALLOWLIST:-}
    working_dir: /app
    command: >
      sh -lc '
        runtime="$${FRONTEND_DEV_RUNTIME:-stable}";
        bundler="$${FRONTEND_DEV_BUNDLER:-webpack}";
        if [ "$$runtime" = "hot" ]; then
          mkdir -p .next .next/dev .next/cache;
          find .next -mindepth 1 -maxdepth 1 ! -name dev ! -name cache -exec rm -rf {} +;
          if [ "$$bundler" = "webpack" ]; then
            exec npm run dev -- --webpack --hostname 0.0.0.0 --port ${PORT:-3000};
          fi;
          exec npm run dev -- --turbopack --hostname 0.0.0.0 --port ${PORT:-3000};
        fi;
        exec env NODE_ENV=production npm run start -- --hostname 0.0.0.0 --port ${PORT:-3000}
      '
    volumes:
      - ./app:/app
      - paramascotasec_node_modules:/app/node_modules
      - paramascotasec_next_build:/app/.next
    tmpfs:
      - /app/.next/dev:size=1536m,mode=1777
      - /app/.next/cache:size=768m,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${PORT:-3000}/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    expose:
      - "3000"
    secrets:
      - source: internal_proxy_token
        target: internal_proxy_token
        mode: 0444
    networks:
      web_internal:
        aliases:
          - next-test-app
          - paramascotasec-frontend

networks:
  web_internal:
    external: true
    name: paramascotasec-web-internal

volumes:
  paramascotasec_node_modules:
  paramascotasec_next_build:

secrets:
  internal_proxy_token:
    file: ${INTERNAL_PROXY_TOKEN_SOURCE_FILE:-./.secrets/internal_proxy_token}
