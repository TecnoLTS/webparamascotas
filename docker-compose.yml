x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    profiles: ["production"]
    image: webparamascotas
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_SITE_DOMAIN: ${NEXT_PUBLIC_SITE_DOMAIN:-paramascotasec.com}
        NEXT_PUBLIC_SITE_ALIASES: ${NEXT_PUBLIC_SITE_ALIASES:-www.paramascotasec.com}
        NEXT_PUBLIC_SITE_LOCAL_IPS: ${NEXT_PUBLIC_SITE_LOCAL_IPS:-}
        NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-paramascotasec}
        NEXT_PUBLIC_API_SERVICE_SEGMENT: ${NEXT_PUBLIC_API_SERVICE_SEGMENT:-api}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/paramascotasec/api}
        NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: webparamascotas
    hostname: webparamascotas
    restart: unless-stopped
    logging: *default-logging
    init: true
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Guayaquil
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      NEXT_TELEMETRY_DISABLED: 1
      PORT: ${PORT:-3000}
      API_FETCH_TIMEOUT_MS: ${API_FETCH_TIMEOUT_MS:-15000}
      NEXT_PUBLIC_CONTAINER_NAME: webparamascotas
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_SITE_DOMAIN: ${NEXT_PUBLIC_SITE_DOMAIN:-paramascotasec.com}
      NEXT_PUBLIC_SITE_ALIASES: ${NEXT_PUBLIC_SITE_ALIASES:-www.paramascotasec.com}
      NEXT_PUBLIC_SITE_LOCAL_IPS: ${NEXT_PUBLIC_SITE_LOCAL_IPS:-}
      NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-paramascotasec}
      NEXT_PUBLIC_API_SERVICE_SEGMENT: ${NEXT_PUBLIC_API_SERVICE_SEGMENT:-api}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/paramascotasec/api}
      NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
      BACKEND_URL_INTERNAL: ${BACKEND_URL_INTERNAL:-http://backend-http:8080/api}
      INTERNAL_PROXY_TOKEN_FILE: /run/secrets/internal_proxy_token
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      PANEL_IP_MODE: ${PANEL_IP_MODE:-off}
      PANEL_IP_ALLOWLIST: ${PANEL_IP_ALLOWLIST:-}
    working_dir: /app
    command: node_modules/.bin/next start --hostname 0.0.0.0 --port ${PORT:-3000}
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const socket=net.connect({host:'127.0.0.1',port:Number(process.env.PORT||3000)});socket.on('connect',()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1500)"]
      interval: 30s
      timeout: 3s
      retries: 6
      start_period: 20s
    expose:
      - "3000"
    volumes:
      - ./app/public/uploads:/app/public/uploads:rw
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=512m,uid=10001,gid=10001,mode=1777
    secrets:
      - source: internal_proxy_token
        target: internal_proxy_token
        mode: 0444
    networks:
      web_internal:
        aliases:
          - webparamascotas

  runtime:
    profiles: ["qa"]
    image: webparamascotas
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runner
      args:
        APP_ENV: ${APP_ENV:-qa}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_SITE_DOMAIN: ${NEXT_PUBLIC_SITE_DOMAIN:-paramascotasec.com}
        NEXT_PUBLIC_SITE_ALIASES: ${NEXT_PUBLIC_SITE_ALIASES:-www.paramascotasec.com}
        NEXT_PUBLIC_SITE_LOCAL_IPS: ${NEXT_PUBLIC_SITE_LOCAL_IPS:-}
        NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-paramascotasec}
        NEXT_PUBLIC_API_SERVICE_SEGMENT: ${NEXT_PUBLIC_API_SERVICE_SEGMENT:-api}
        NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/paramascotasec/api}
        NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: webparamascotas
    hostname: webparamascotas
    restart: unless-stopped
    logging: *default-logging
    init: true
    user: "10001:10001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Guayaquil
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-qa}
      NEXT_PUBLIC_APP_ENV: ${APP_ENV:-qa}
      NEXT_TELEMETRY_DISABLED: 1
      FRONTEND_QA_RUNTIME: ${FRONTEND_QA_RUNTIME:-stable}
      FRONTEND_QA_BUNDLER: ${FRONTEND_QA_BUNDLER:-webpack}
      PORT: ${PORT:-3000}
      API_FETCH_TIMEOUT_MS: ${API_FETCH_TIMEOUT_MS:-15000}
      NEXT_PUBLIC_CONTAINER_NAME: webparamascotas
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_SITE_DOMAIN: ${NEXT_PUBLIC_SITE_DOMAIN:-paramascotasec.com}
      NEXT_PUBLIC_SITE_ALIASES: ${NEXT_PUBLIC_SITE_ALIASES:-www.paramascotasec.com}
      NEXT_PUBLIC_SITE_LOCAL_IPS: ${NEXT_PUBLIC_SITE_LOCAL_IPS:-}
      NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-paramascotasec}
      NEXT_PUBLIC_API_SERVICE_SEGMENT: ${NEXT_PUBLIC_API_SERVICE_SEGMENT:-api}
      NEXT_PUBLIC_API_BASE_PATH: ${NEXT_PUBLIC_API_BASE_PATH:-/paramascotasec/api}
      NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_AUTH_CSRF_COOKIE_NAME:-pm_csrf}
      BACKEND_URL_INTERNAL: ${BACKEND_URL_INTERNAL:-http://backend-http:8080/api}
      INTERNAL_PROXY_TOKEN_FILE: /run/secrets/internal_proxy_token
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      PANEL_IP_MODE: ${PANEL_IP_MODE:-off}
      PANEL_IP_ALLOWLIST: ${PANEL_IP_ALLOWLIST:-}
    working_dir: /app
    command: node_modules/.bin/next start --hostname 0.0.0.0 --port ${PORT:-3000}
    volumes:
      - ./app/public/uploads:/app/public/uploads:rw
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/.next/cache:size=512m,uid=10001,gid=10001,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${PORT:-3000}/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    expose:
      - "3000"
    secrets:
      - source: internal_proxy_token
        target: internal_proxy_token
        mode: 0444
    networks:
      web_internal:
        aliases:
          - webparamascotas

networks:
  web_internal:
    external: true
    name: webparamascotas-internal

secrets:
  internal_proxy_token:
    file: ./entorno/.secrets/internal_proxy_token
